<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AegisQA Demo Sandbox</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #0b0f19;
      color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background-color: #111827;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    h2 {
      color: #06b6d4;
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 22px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 10px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 6px;
      font-weight: 600;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 14px;
      background: #1f2937;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
    }
    input:focus {
      outline: none;
      border-color: #06b6d4;
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(6, 182, 212, 0.2);
      transition: all 0.2s;
    }
    button:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }
    .dashboard {
      animation: fadeIn 0.4s forwards;
    }
    .hidden {
      display: none !important;
    }
    .dashboard-status {
      font-family: monospace;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid #10b981;
      color: #10b981;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 18px;
      text-align: center;
    }
    .action-row {
      margin-top: 14px;
      display: flex;
      gap: 10px;
    }
    .toast {
      display: none;
      background-color: rgba(6, 182, 212, 0.1);
      border: 1px solid #06b6d4;
      color: #06b6d4;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 12px;
      text-align: center;
      animation: slideDown 0.3s forwards;
    }
    .sec-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;
      box-shadow: none;
    }
    .sec-btn:hover {
      background: rgba(255,255,255,0.1);
    }
    iframe {
      width: 100%;
      height: 60px;
      border: 1px dashed rgba(255,255,255,0.15);
      border-radius: 6px;
      margin-top: 14px;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>AegisQA App Target</h2>
    
    <!-- LOGIN INTERFACE -->
    <div id="login-form">
      <div class="form-group">
        <label for="input-username">DEMO USERNAME</label>
        <input type="text" id="input-username" placeholder="e.g. admin">
      </div>
      <div class="form-group">
        <label for="input-password">ACCESS PASSWORD</label>
        <input type="password" id="input-password" placeholder="e.g. password">
      </div>
      <button id="btn-submit">Sign In to Dashboard</button>
    </div>

    <!-- DYNAMIC DASHBOARD (POST LOGIN) -->
    <div id="dashboard" class="dashboard hidden">
      <div class="dashboard-status" id="checkout-status">Dashboard Active</div>
      <p style="font-size:12px; color:#9ca3af; margin-bottom:12px;">Welcome back. Perform operations below to verify action engines.</p>
      
      <button id="btn-trigger-action" class="sec-btn">Execute Action Flow</button>
      <div class="toast" id="toast-message">Operation Successful</div>

      <!-- Shadow DOM Piercing Test Zone -->
      <div style="margin-top:14px;" id="shadow-container"></div>

      <!-- Iframe Target Test Zone -->
      <iframe srcdoc="
        <html>
        <body style='background:#1f2937; margin:0; display:flex; justify-content:center; align-items:center; height:100%; font-family:sans-serif;'>
          <button id='iframe-btn' style='background:#10b981; color:#fff; border:none; padding:8px 12px; border-radius:4px; font-weight:600; font-size:11px; cursor:pointer;'>Iframe Checkout</button>
          <script>
            document.getElementById('iframe-btn').onclick = () => {
              document.getElementById('iframe-btn').textContent = 'Paid!';
              document.getElementById('iframe-btn').style.background = '#059669';
            };
          </script>
        </body>
        </html>
      "></iframe>
    </div>
  </div>

  <script>
    // Handle login state transitions
    document.getElementById('btn-submit').addEventListener('click', () => {
      const user = document.getElementById('input-username').value;
      const pass = document.getElementById('input-password').value;
      
      if (user && pass) {
        document.getElementById('login-form').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
      }
    });


    // Handle standard actions
    document.getElementById('btn-trigger-action').addEventListener('click', () => {
      const toast = document.getElementById('toast-message');
      toast.style.display = 'block';
      setTimeout(() => {
        toast.style.display = 'none';
      }, 5000);
    });

    // Build Shadow DOM elements programmatically
    const shadowContainer = document.getElementById('shadow-container');
    const shadowRoot = shadowContainer.attachShadow({ mode: 'open' });
    
    const wrapper = document.createElement('div');
    wrapper.innerHTML = `
      <style>
        .shadow-box {
          border: 1px solid rgba(255, 255, 255, 0.08);
          background: rgba(255, 255, 255, 0.02);
          border-radius: 6px;
          padding: 10px;
          display: flex;
          justify-content: space-between;
          align-items: center;
        }
        span { font-size: 11px; color: #9ca3af; }
        button {
          background: #3b82f6;
          color: white;
          border: none;
          padding: 6px 12px;
          border-radius: 4px;
          font-size: 10px;
          font-weight: 600;
          cursor: pointer;
        }
      </style>
      <div class='shadow-box'>
        <span>Shadow DOM Component</span>
        <button id='btn-shadow-action'>Shadow Click</button>
      </div>
    `;
    
    shadowRoot.appendChild(wrapper);
    
    // Bind shadow button click
    shadowRoot.getElementById('btn-shadow-action').addEventListener('click', () => {
      const btn = shadowRoot.getElementById('btn-shadow-action');
      btn.textContent = 'Triggered!';
      btn.style.background = '#2563eb';
    });
  </script>
</body>
</html>
